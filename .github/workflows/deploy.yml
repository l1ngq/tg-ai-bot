name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -eu
            APP_DIR="/opt/tg-bot"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_BRANCH="main"
            IMAGE_NAME="tg-bot:latest"
            CONTAINER_NAME="tg-bot"
            ENV_FILE="$APP_DIR/.env"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo -n mkdir -p "$APP_DIR"
              sudo -n chown -R "$USER":"$USER" "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            else
              sudo -n chown -R "$USER":"$USER" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --prune origin
            git reset --hard "origin/$DEPLOY_BRANCH"

            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            sudo -n docker build -t "$IMAGE_NAME" .
            sudo -n docker stop "$CONTAINER_NAME" || true
            sudo -n docker rm "$CONTAINER_NAME" || true
            sudo -n docker run -d --name "$CONTAINER_NAME" --restart unless-stopped --env-file "$ENV_FILE" "$IMAGE_NAME"
