name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH secrets
        shell: bash
        run: |
          set -e
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "SSH_HOST is empty"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "SSH_USER is empty"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then
            echo "SSH_PORT is empty"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "SSH_KEY is empty"
            exit 1
          fi
          printf "%s" "${{ secrets.SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh-keygen -lf /tmp/ssh_key
          rm -f /tmp/ssh_key
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=/opt/tg-bot
            REPO_URL="https://github.com/${{ github.repository }}.git"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main
            docker build -t tg-bot:latest .
            docker stop tg-bot || true
            docker rm tg-bot || true
            docker run -d --name tg-bot --restart unless-stopped --env-file "$APP_DIR/.env" tg-bot:latest
